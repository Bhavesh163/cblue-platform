services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: cblue
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-NewPass456!}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cblue"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-password}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-cblue}/backend:latest
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
      
    environment:
      DATABASE_URL: postgresql://admin:${POSTGRES_PASSWORD:-NewPass456!}@postgres:5432/cblue
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-password}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      PORT: 3002
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  vision-service:
    build:
      context: ../../ai_services/vision-service
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    volumes:
      - vision_data:/tmp/cblue-vision
    environment:
      VISION_STORAGE_DIR: /tmp/cblue-vision
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  vision_data:
