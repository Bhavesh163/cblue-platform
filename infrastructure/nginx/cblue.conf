# ── CBLUE Platform — Nginx Reverse Proxy ──
# For manual deployment to host nginx (if iptables redirect not available).
# sudo cp cblue.conf /etc/nginx/sites-available/cblue
# sudo ln -sf /etc/nginx/sites-available/cblue /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# ── API Backend (NestJS) ──
server {
    listen 80 default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;

        # File upload size (for KYC/images)
        client_max_body_size 25M;
    }
}
