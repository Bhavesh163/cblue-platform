# ── CBLUE Platform — Nginx Reverse Proxy ──
# Place in /etc/nginx/sites-available/ on your DigitalOcean droplet
# sudo ln -s /etc/nginx/sites-available/cblue /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# ── API Backend (NestJS) ──
server {
    listen 80;
    server_name api.cblue.co.th;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;

        # File upload size (for KYC/images)
        client_max_body_size 25M;
    }
}

# ── Web Frontend (Next.js) ──
server {
    listen 80;
    server_name www.cblue.co.th cblue.co.th;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── RabbitMQ Management (admin only, restrict IP in production) ──
server {
    listen 80;
    server_name rabbitmq.cblue.co.th;

    # In production: restrict to admin IPs
    # allow 203.0.113.0/24;
    # deny all;

    location / {
        proxy_pass http://127.0.0.1:15672;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
