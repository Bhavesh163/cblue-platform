name: Backend CI/CD

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'infrastructure/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: postgresql://admin:testpassword@localhost:5432/cblue_test
      JWT_SECRET: test-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      NODE_ENV: test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cblue_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm test

      - run: npm run build

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check if backend changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(backend/|infrastructure/docker/)'; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Downcase repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/backend:${{ github.sha }}
            ghcr.io/${{ env.REPO }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [test, docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      packages: read

    steps:
      - name: Check deployment secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.DROPLET_HOST }}" ]; then
            echo "⚠️ DROPLET_HOST secret not configured — skipping deploy"
            echo "Add secrets in GitHub → Settings → Secrets and variables → Actions"
            echo "Required: DROPLET_HOST, DROPLET_USER, DROPLET_SSH_KEY"
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate SSH key format
        if: steps.check_secrets.outputs.has_secrets == 'true'
        env:
          SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          if echo "$SSH_KEY" | head -1 | grep -qE '^-----BEGIN'; then
            echo "✅ SSH key format looks valid"
          else
            echo "❌ ERROR: DROPLET_SSH_KEY does not appear to be a valid SSH private key"
            echo ""
            echo "The key must:"
            echo "  1. Be a PRIVATE key (not .pub file)"
            echo "  2. Start with: -----BEGIN OPENSSH PRIVATE KEY----- or -----BEGIN RSA PRIVATE KEY-----"
            echo "  3. End with:   -----END OPENSSH PRIVATE KEY----- or -----END RSA PRIVATE KEY-----"
            echo "  4. NOT have a passphrase"
            echo "  5. Include ALL lines between header and footer"
            echo ""
            echo "To generate a new key without passphrase:"
            echo "  ssh-keygen -t ed25519 -f cblue-deploy -N '' -C 'cblue-deploy'"
            echo "Then add cblue-deploy.pub to the droplet (~/.ssh/authorized_keys)"
            echo "and paste the content of cblue-deploy into DROPLET_SSH_KEY secret"
            exit 1
          fi

      - name: Deploy to DigitalOcean Droplet
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DEPLOY_SHA: ${{ github.sha }}
          MAILJET_API_KEY: ${{ secrets.MAILJET_API_KEY }}
          MAILJET_SECRET_KEY: ${{ secrets.MAILJET_SECRET_KEY }}
          MAILJET_API_SUBACCOUNT_KEY: ${{ secrets.MAILJET_API_SUBACCOUNT_KEY || secrets.MAILJET_API_KEY }}
          MAILJET_SECRET_SUBACCOUNT_KEY: ${{ secrets.MAILJET_SECRET_SUBACCOUNT_KEY || secrets.MAILJET_SECRET_KEY }}
          MAILJET_FROM_EMAIL: ${{ secrets.MAILJET_FROM_EMAIL || vars.MAILJET_FROM_EMAIL }}
          MAILJET_SENDER_EMAIL: ${{ secrets.MAILJET_SENDER_EMAIL || secrets.MAILJET_FROM_EMAIL || vars.MAILJET_SENDER_EMAIL || vars.MAILJET_FROM_EMAIL }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GH_TOKEN,GH_REPO,DEPLOY_SHA,MAILJET_API_KEY,MAILJET_SECRET_KEY,MAILJET_API_SUBACCOUNT_KEY,MAILJET_SECRET_SUBACCOUNT_KEY,MAILJET_FROM_EMAIL,MAILJET_SENDER_EMAIL
          command_timeout: 120m
          script: |
            set -e

            export COMPOSE_HTTP_TIMEOUT=300

            echo "🚀 Starting deployment ($DEPLOY_SHA)..."

            # ── Detect privilege level ──
            if [ "$(id -u)" -eq 0 ]; then
              SUDO=""
            elif sudo -n true 2>/dev/null; then
              SUDO="sudo"
            else
              SUDO="SKIP"
              echo "⚠️ Running as $(whoami) without passwordless sudo"
            fi

            # ── Ensure project directory exists ──
            DEPLOY_DIR="/opt/cblue-platform"
            if [ "$SUDO" = "SKIP" ]; then
              DEPLOY_DIR="$HOME/cblue-platform"
            fi

            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "📦 Cloning repository..."
              if [ -n "$SUDO" ] && [ "$SUDO" != "SKIP" ]; then
                $SUDO mkdir -p "$DEPLOY_DIR"
                $SUDO chown "$(whoami):$(whoami)" "$DEPLOY_DIR"
              fi
              git clone https://github.com/Bhavesh163/cblue-platform.git "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git pull origin main || true
            echo "✅ Code updated"

            # ── Detect docker compose command ──
            if docker compose version 2>/dev/null | grep -q 'compose'; then
              DC="docker compose"
            elif docker-compose --version 2>/dev/null | grep -qi 'compose'; then
              DC="docker-compose"
            else
              echo "⚠️ Warning: No valid docker compose found. Will use docker run fallbacks."
              DC="docker"
            fi
            echo "Using: $DC"

            # ── Pull or build backend image ──
            REPO_LC=$(echo "$GH_REPO" | tr '[:upper:]' '[:lower:]')
            export GITHUB_REPOSITORY="$REPO_LC"
            IMAGE="ghcr.io/$REPO_LC/backend:latest"

            docker image prune -f || true
            df -h
            free -m
            PULLED_IMAGE=false
            if echo "$GH_TOKEN" | docker login ghcr.io -u github --password-stdin 2>&1; then
              echo "✅ Logged in to GHCR"
              # 90-minute timeout on pull — the droplet has extremely slow bandwidth
              echo "Pulling $IMAGE (90m timeout)..."
              if timeout 5400 docker pull "$IMAGE" 2>&1; then
                echo "✅ Pulled backend image from GHCR"
                PULLED_IMAGE=true
              else
                echo "⚠️ Pull timed out or failed after 90m"
              fi
            else
              echo "⚠️ GHCR login failed"
            fi

            if [ "$PULLED_IMAGE" = "false" ]; then
              echo "⚠️ Using existing local image (local build too slow on this droplet)"
              if docker images "$IMAGE" --format "{{.ID}}" | head -1 | grep -q .; then
                echo "✅ Found existing local image"
              else
                echo "❌ No local image found and pull failed — cannot deploy"
                exit 1
              fi
            fi

            # ── Start infrastructure first, then backend ──
            if [ "$DC" != "docker" ]; then
              $DC -f infrastructure/docker/docker-compose.yml rm -sf backend 2>/dev/null || true
              $DC -f infrastructure/docker/docker-compose.yml rm -sf nginx 2>/dev/null || true
            fi

            # Restart unhealthy infrastructure containers before starting backend
            echo "🔧 Ensuring infrastructure containers are healthy..."
            for SVC in postgres redis rabbitmq; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$(docker ps -aqf "name=$SVC" | head -1)" 2>/dev/null || echo "none")
              if [ "$STATUS" = "unhealthy" ]; then
                echo "  ⚠️ $SVC is unhealthy — restarting..."
                docker restart "docker_${SVC}_1" 2>/dev/null || docker restart "cblue-platform_${SVC}_1" 2>/dev/null || true
              fi
            done

            # Start infrastructure services (try docker compose if available)
            if [ "$DC" != "docker" ]; then
              $DC -f infrastructure/docker/docker-compose.yml up -d postgres redis rabbitmq 2>&1 || true
            else
              echo "⚠️ Cannot check infrastructure via compose. Assuming they are running natively."
            fi
            echo "⏳ Waiting for infrastructure to stabilize..."
            sleep 15

            # Resolve the primary postgres container explicitly (avoid selecting another project's DB).
            POSTGRES_CONTAINER=$(docker ps --format "{{.Names}}" | grep -E '^docker_postgres_1$|^cblue-platform_postgres_1$|^postgres$|postgres' | head -1)
            if [ -z "$POSTGRES_CONTAINER" ]; then
              echo "❌ Postgres container not found"
              docker ps -a 2>&1
              exit 1
            fi

            PG_USER=$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$POSTGRES_CONTAINER" 2>/dev/null | grep '^POSTGRES_USER=' | sed 's/^POSTGRES_USER=//' | head -1 || true)
            PG_DB=$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$POSTGRES_CONTAINER" 2>/dev/null | grep '^POSTGRES_DB=' | sed 's/^POSTGRES_DB=//' | head -1 || true)
            PG_PASSWORD=$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$POSTGRES_CONTAINER" 2>/dev/null | grep '^POSTGRES_PASSWORD=' | sed 's/^POSTGRES_PASSWORD=//' | head -1 || true)
            if [ -z "$PG_USER" ]; then PG_USER='admin'; fi
            if [ -z "$PG_DB" ]; then PG_DB='cblue'; fi
            if [ -z "$PG_PASSWORD" ]; then PG_PASSWORD='NewPass456!'; fi

            # Wait for postgres specifically (it's the critical dependency)
            for i in $(seq 1 12); do
              if docker exec "$POSTGRES_CONTAINER" pg_isready -U "$PG_USER" -d "$PG_DB" >/dev/null 2>&1; then
                echo "✅ Postgres is ready"
                break
              fi
              echo "  Waiting for postgres... ($i/12)"
              sleep 5
            done

            # Keep current backend alive during deploy; only switch after candidate is healthy.
            PREV_BACKEND=$(docker ps --filter "publish=3002" --format "{{.Names}}" | head -1)
            echo "Current backend on :3002: ${PREV_BACKEND:-none}"
            docker rm -f cblue_backend_candidate 2>/dev/null || true

            resolve_runtime_env() {
              runtime_key="$1"
              runtime_current_value=$(eval "printf '%s' \"\${$runtime_key:-}\"")
              runtime_file_value=""
              runtime_container_value=""

              if [ -n "$runtime_current_value" ]; then
                printf '%s' "$runtime_current_value"
                return
              fi

              if [ -f "$DEPLOY_DIR/backend/.env" ]; then
                runtime_file_value=$(grep -E "^${runtime_key}=" "$DEPLOY_DIR/backend/.env" | tail -1 | cut -d '=' -f2- | sed 's/^"//;s/"$//' || true)
                if [ -n "$runtime_file_value" ]; then
                  printf '%s' "$runtime_file_value"
                  return
                fi
              fi

              if [ -n "$PREV_BACKEND" ]; then
                runtime_container_value=$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$PREV_BACKEND" 2>/dev/null | grep "^${runtime_key}=" | sed "s/^${runtime_key}=//" | head -1 || true)
                if [ -n "$runtime_container_value" ]; then
                  printf '%s' "$runtime_container_value"
                fi
              fi
            }

            # Resolve DATABASE_URL from backend .env first (if present), then selected postgres container env.
            DATABASE_URL_RUNTIME=""
            if [ -f "$DEPLOY_DIR/backend/.env" ]; then
              DATABASE_URL_RUNTIME=$(grep -E '^DATABASE_URL=' "$DEPLOY_DIR/backend/.env" | tail -1 | cut -d '=' -f2- | sed 's/^"//;s/"$//' || true)
            fi

            # If .env did not provide DATABASE_URL, derive from selected postgres container env.
            if [ -z "$DATABASE_URL_RUNTIME" ]; then
            PG_PASSWORD_ENC="$PG_PASSWORD"
            if command -v python3 >/dev/null 2>&1; then
              PG_PASSWORD_ENC=$(python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=""))' "$PG_PASSWORD")
            fi
            DATABASE_URL_RUNTIME="postgresql://${PG_USER}:${PG_PASSWORD_ENC}@${POSTGRES_CONTAINER}:5432/${PG_DB}"
            fi

            # Fallback: if postgres env is not readable, reuse live backend DATABASE_URL.
            if [ -z "$DATABASE_URL_RUNTIME" ] && [ -n "$PREV_BACKEND" ]; then
              DATABASE_URL_RUNTIME=$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$PREV_BACKEND" 2>/dev/null | grep '^DATABASE_URL=' | sed 's/^DATABASE_URL=//' | head -1 || true)
            fi
            echo "Resolved runtime DATABASE_URL for backend deployment"

            # Build service hosts for the same compose stack prefix as selected postgres.
            STACK_PREFIX=$(echo "$POSTGRES_CONTAINER" | sed -E 's/postgres.*$//')
            REDIS_HOST="redis"
            RABBIT_HOST="rabbitmq"
            if [ -n "$STACK_PREFIX" ] && docker ps --format "{{.Names}}" | grep -q "^${STACK_PREFIX}redis_1$"; then
              REDIS_HOST="${STACK_PREFIX}redis_1"
            fi
            if [ -n "$STACK_PREFIX" ] && docker ps --format "{{.Names}}" | grep -q "^${STACK_PREFIX}rabbitmq_1$"; then
              RABBIT_HOST="${STACK_PREFIX}rabbitmq_1"
            fi
            RABBIT_USER=$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$RABBIT_HOST" 2>/dev/null | grep '^RABBITMQ_DEFAULT_USER=' | sed 's/^RABBITMQ_DEFAULT_USER=//' | head -1 || true)
            RABBIT_PASS=$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$RABBIT_HOST" 2>/dev/null | grep '^RABBITMQ_DEFAULT_PASS=' | sed 's/^RABBITMQ_DEFAULT_PASS=//' | head -1 || true)
            if [ -z "$RABBIT_USER" ]; then RABBIT_USER='admin'; fi
            if [ -z "$RABBIT_PASS" ]; then RABBIT_PASS='password'; fi

            MAILJET_API_KEY_RUNTIME=$(resolve_runtime_env MAILJET_API_KEY)
            MAILJET_SECRET_KEY_RUNTIME=$(resolve_runtime_env MAILJET_SECRET_KEY)
            MAILJET_API_SUBACCOUNT_KEY_RUNTIME=$(resolve_runtime_env MAILJET_API_SUBACCOUNT_KEY)
            MAILJET_SECRET_SUBACCOUNT_KEY_RUNTIME=$(resolve_runtime_env MAILJET_SECRET_SUBACCOUNT_KEY)
            MAILJET_FROM_EMAIL_RUNTIME=$(resolve_runtime_env MAILJET_FROM_EMAIL)
            MAILJET_SENDER_EMAIL_RUNTIME=$(resolve_runtime_env MAILJET_SENDER_EMAIL)

            if [ -z "$MAILJET_API_SUBACCOUNT_KEY_RUNTIME" ]; then MAILJET_API_SUBACCOUNT_KEY_RUNTIME="$MAILJET_API_KEY_RUNTIME"; fi
            if [ -z "$MAILJET_SECRET_SUBACCOUNT_KEY_RUNTIME" ]; then MAILJET_SECRET_SUBACCOUNT_KEY_RUNTIME="$MAILJET_SECRET_KEY_RUNTIME"; fi
            if [ -z "$MAILJET_FROM_EMAIL_RUNTIME" ]; then MAILJET_FROM_EMAIL_RUNTIME="$MAILJET_SENDER_EMAIL_RUNTIME"; fi
            if [ -z "$MAILJET_SENDER_EMAIL_RUNTIME" ]; then MAILJET_SENDER_EMAIL_RUNTIME="$MAILJET_FROM_EMAIL_RUNTIME"; fi

            # Use raw docker commands for deployment to bypass broken docker-compose aliasing
            echo "🚀 Deploying candidate backend container on :3003..."
            # Use the same network as the selected postgres container.
            NETWORK=$(docker inspect -f '{{range $k,$v := .NetworkSettings.Networks}}{{printf "%s\n" $k}}{{end}}' "$POSTGRES_CONTAINER" 2>/dev/null | head -1)
            if [ -z "$NETWORK" ]; then NETWORK="bridge"; fi
            echo "Using network: $NETWORK"
            docker run -d --name cblue_backend_candidate \
                --network "$NETWORK" \
                --restart unless-stopped \
              -p 3003:3002 \
                -e DATABASE_URL="$DATABASE_URL_RUNTIME" \
                -e REDIS_HOST="$REDIS_HOST" -e REDIS_PORT=6379 \
                -e RABBITMQ_URL="amqp://${RABBIT_USER}:${RABBIT_PASS}@${RABBIT_HOST}:5672" \
                -e JWT_SECRET=change-in-production \
                -e JWT_REFRESH_SECRET=change-in-production \
                -e JWT_EXPIRATION=15m -e JWT_REFRESH_EXPIRATION=7d \
                -e MAILJET_API_KEY="$MAILJET_API_KEY_RUNTIME" \
                -e MAILJET_SECRET_KEY="$MAILJET_SECRET_KEY_RUNTIME" \
                -e MAILJET_API_SUBACCOUNT_KEY="$MAILJET_API_SUBACCOUNT_KEY_RUNTIME" \
                -e MAILJET_SECRET_SUBACCOUNT_KEY="$MAILJET_SECRET_SUBACCOUNT_KEY_RUNTIME" \
                -e MAILJET_FROM_EMAIL="$MAILJET_FROM_EMAIL_RUNTIME" \
                -e MAILJET_SENDER_EMAIL="$MAILJET_SENDER_EMAIL_RUNTIME" \
                -e RESET_PASSWORD_DEBUG_HEADER=true \
                -e FRONTEND_URL="https://cblue.co.th" \
                -e PORT=3002 -e NODE_ENV=production \
                --restart unless-stopped \
                "$IMAGE" 2>&1 || {
                  echo "❌ Failed to start candidate backend container"
                  docker ps -a 2>&1
                  exit 1
                }

            echo "⏳ Waiting for candidate backend to start..."
            sleep 20

            # ── Run Prisma migrations via direct SQL (bypasses prisma CLI config issues) ──
            BACKEND_CONTAINER="cblue_backend_candidate"
            if [ -z "$POSTGRES_CONTAINER" ]; then
              echo "❌ Postgres container not found!"
              docker ps -a 2>&1
              exit 1
            fi
            echo "Using postgres: $POSTGRES_CONTAINER, backend: $BACKEND_CONTAINER"

            # Always try to apply pending migrations to avoid schema drift runtime 500s.
            echo "📦 Running migrations via direct SQL (pending-only)..."

            # Create _prisma_migrations table if it doesn't exist
            docker exec "$POSTGRES_CONTAINER" psql -U "$PG_USER" -d "$PG_DB" -c "
              CREATE TABLE IF NOT EXISTS _prisma_migrations (
                id VARCHAR(36) PRIMARY KEY,
                checksum VARCHAR(64) NOT NULL,
                finished_at TIMESTAMPTZ,
                migration_name VARCHAR(255) NOT NULL,
                logs TEXT,
                rolled_back_at TIMESTAMPTZ,
                started_at TIMESTAMPTZ NOT NULL DEFAULT now(),
                applied_steps_count INTEGER NOT NULL DEFAULT 0
              );
            " 2>&1

            # Apply each migration SQL file in order
            MIGRATIONS_DIR="$DEPLOY_DIR/backend/prisma/migrations"
            for MIG_DIR in $(ls -d "$MIGRATIONS_DIR"/*/ 2>/dev/null | sort); do
              MIG_NAME=$(basename "$MIG_DIR")
              MIG_SQL="$MIG_DIR/migration.sql"
              if [ ! -f "$MIG_SQL" ]; then continue; fi

              # Check if already applied
                ALREADY=$(docker exec "$POSTGRES_CONTAINER" psql -U "$PG_USER" -d "$PG_DB" -t -c \
                "SELECT count(*) FROM _prisma_migrations WHERE migration_name='$MIG_NAME';" 2>&1 | tr -d ' ')

              if [ "$ALREADY" = "0" ]; then
                echo "  Applying: $MIG_NAME"
                docker cp "$MIG_SQL" "$POSTGRES_CONTAINER:/tmp/migration.sql"
                  if docker exec "$POSTGRES_CONTAINER" psql -U "$PG_USER" -d "$PG_DB" -f /tmp/migration.sql 2>&1; then
                    docker exec "$POSTGRES_CONTAINER" psql -U "$PG_USER" -d "$PG_DB" -c \
                    "INSERT INTO _prisma_migrations (id, checksum, finished_at, migration_name, applied_steps_count) VALUES (md5(random()::text || clock_timestamp()::text), md5('$MIG_NAME'), now(), '$MIG_NAME', 1) ON CONFLICT DO NOTHING;" 2>&1
                else
                  echo "❌ Migration $MIG_NAME failed"
                  exit 1
                fi
              else
                echo "  Skip (already applied): $MIG_NAME"
              fi
            done

            TABLE_COUNT_AFTER=$(docker exec "$POSTGRES_CONTAINER" psql -U "$PG_USER" -d "$PG_DB" -t -c \
              "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE';" 2>&1 | tr -d ' ')
            echo "✅ Tables after migration check: $TABLE_COUNT_AFTER"

            # ── Restart backend to pick up new tables ──
            docker restart "$BACKEND_CONTAINER" 2>/dev/null || true
            sleep 10

            # ── Verify candidate backend readiness on 3003 (do not use curl -f; 4xx can still mean app is up) ──
            CANDIDATE_READY="false"
            CANDIDATE_HEALTH_CODE="000"
            CANDIDATE_LOGIN_CODE="000"

            normalize_http_code() {
              CODE_RAW="$1"
              CODE_ONLY=$(echo "$CODE_RAW" | tr -cd '0-9')
              CODE_LAST3=$(echo "$CODE_ONLY" | tail -c 4)
              if [ -z "$CODE_LAST3" ]; then
                echo "000"
              else
                echo "$CODE_LAST3"
              fi
            }

            for i in $(seq 1 12); do
              CANDIDATE_HEALTH_RAW=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3003/api/v1/health || true)
              CANDIDATE_LOGIN_RAW=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:3003/api/v1/subscription/login -H "Content-Type: application/json" -d '{"email":"probe@example.com","password":"invalid"}' || true)
              CANDIDATE_HEALTH_CODE=$(normalize_http_code "$CANDIDATE_HEALTH_RAW")
              CANDIDATE_LOGIN_CODE=$(normalize_http_code "$CANDIDATE_LOGIN_RAW")
              echo "Candidate probe ($i/12): health=${CANDIDATE_HEALTH_CODE}, login=${CANDIDATE_LOGIN_CODE}"

              if [ "$CANDIDATE_HEALTH_CODE" != "000" ] || [ "$CANDIDATE_LOGIN_CODE" != "000" ]; then
                CANDIDATE_READY="true"
                break
              fi
              sleep 5
            done

            if [ "$CANDIDATE_READY" = "true" ]; then
              # ── Verify registration endpoint on candidate with retries ──
              REG_TEST="000"
              for i in $(seq 1 8); do
                REG_RAW=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:3003/api/v1/subscription/register \
                  -H "Content-Type: application/json" \
                  -d '{"name":"test","email":"deploy-test@example.com","password":"NotReal1!","phone":"0000000000"}' || true)
                REG_TEST=$(normalize_http_code "$REG_RAW")
                echo "Candidate registration endpoint status ($i/8): $REG_TEST"

                # 201=success, 409=email exists (both mean it works), 400=validation (works)
                if [ "$REG_TEST" = "201" ] || [ "$REG_TEST" = "409" ] || [ "$REG_TEST" = "400" ]; then
                  echo "✅ Candidate registration endpoint is functional"
                  break
                fi
                sleep 4
              done

              if [ "$REG_TEST" != "201" ] && [ "$REG_TEST" != "409" ] && [ "$REG_TEST" != "400" ]; then
                echo "❌ Candidate registration returned $REG_TEST — keeping existing backend untouched"
                docker logs --tail=80 "$BACKEND_CONTAINER" 2>&1 || true
                exit 1
              fi

              echo "✅ Candidate healthy — promoting to live on :3002"
              docker rm -f cblue_backend_fallback docker_backend_1 cblue-platform_backend_1 2>/dev/null || true
              if [ -n "$PREV_BACKEND" ] && [ "$PREV_BACKEND" != "$BACKEND_CONTAINER" ]; then
                docker rm -f "$PREV_BACKEND" 2>/dev/null || true
              fi

              docker run -d --name cblue_backend_fallback \
                --network "$NETWORK" \
                --restart unless-stopped \
                -p 3002:3002 \
                -e DATABASE_URL="$DATABASE_URL_RUNTIME" \
                -e REDIS_HOST="$REDIS_HOST" -e REDIS_PORT=6379 \
                -e RABBITMQ_URL="amqp://${RABBIT_USER}:${RABBIT_PASS}@${RABBIT_HOST}:5672" \
                -e JWT_SECRET=change-in-production \
                -e JWT_REFRESH_SECRET=change-in-production \
                -e JWT_EXPIRATION=15m -e JWT_REFRESH_EXPIRATION=7d \
                -e MAILJET_API_KEY="$MAILJET_API_KEY_RUNTIME" \
                -e MAILJET_SECRET_KEY="$MAILJET_SECRET_KEY_RUNTIME" \
                -e MAILJET_API_SUBACCOUNT_KEY="$MAILJET_API_SUBACCOUNT_KEY_RUNTIME" \
                -e MAILJET_SECRET_SUBACCOUNT_KEY="$MAILJET_SECRET_SUBACCOUNT_KEY_RUNTIME" \
                -e MAILJET_FROM_EMAIL="$MAILJET_FROM_EMAIL_RUNTIME" \
                -e MAILJET_SENDER_EMAIL="$MAILJET_SENDER_EMAIL_RUNTIME" \
                -e RESET_PASSWORD_DEBUG_HEADER=true \
                -e FRONTEND_URL="https://cblue.co.th" \
                -e PORT=3002 -e NODE_ENV=production \
                "$IMAGE" 2>&1

              sleep 10

              # ── Ensure port 80 traffic goes to 3002 (CF worker restriction) ──
              docker run --rm --net=host --cap-add=NET_ADMIN alpine sh -c "apk add --no-cache iptables >/dev/null 2>&1; iptables -t nat -C PREROUTING -p tcp --dport 80 -j REDIRECT --to-port 3002 2>/dev/null || iptables -t nat -A PREROUTING -p tcp --dport 80 -j REDIRECT --to-port 3002"

              LIVE_READY="false"
              FINAL_HEALTH_CODE="000"
              FINAL_LOGIN_CODE="000"
              for i in $(seq 1 18); do
                FINAL_HEALTH_RAW=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3002/api/v1/health || true)
                FINAL_LOGIN_RAW=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:3002/api/v1/subscription/login -H "Content-Type: application/json" -d '{"email":"probe@example.com","password":"invalid"}' || true)
                FINAL_HEALTH_CODE=$(normalize_http_code "$FINAL_HEALTH_RAW")
                FINAL_LOGIN_CODE=$(normalize_http_code "$FINAL_LOGIN_RAW")
                echo "Live backend probe ($i/18): health=${FINAL_HEALTH_CODE}, login=${FINAL_LOGIN_CODE}"

                if [ "$FINAL_HEALTH_CODE" != "000" ] || [ "$FINAL_LOGIN_CODE" != "000" ]; then
                  LIVE_READY="true"
                  break
                fi
                sleep 5
              done

              if [ "$LIVE_READY" = "true" ]; then
                docker rm -f cblue_backend_candidate 2>/dev/null || true
                echo "✅ Deploy complete: $DEPLOY_SHA"
              else
                echo "❌ Live backend failed after promotion"
                docker ps -a 2>&1 || true
                docker logs --tail=80 cblue_backend_fallback 2>&1 || true
                exit 1
              fi
            else
              echo "❌ Candidate backend not healthy — keeping existing backend untouched"
              docker logs --tail=80 "$BACKEND_CONTAINER" 2>&1 || true
              exit 1
            fi
