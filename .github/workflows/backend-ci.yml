name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'infrastructure/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cblue_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://admin:testpassword@localhost:5432/cblue_test
      JWT_SECRET: test-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm test

      - run: npm run build

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if backend changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(backend/|infrastructure/docker/)'; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Downcase repo name
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/backend:${{ github.sha }}
            ghcr.io/${{ env.REPO }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [test, docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: read

    steps:
      - name: Check deployment secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.DROPLET_HOST }}" ]; then
            echo "⚠️ DROPLET_HOST secret not configured — skipping deploy"
            echo "Add secrets in GitHub → Settings → Secrets and variables → Actions"
            echo "Required: DROPLET_HOST, DROPLET_USER, DROPLET_SSH_KEY"
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate SSH key format
        if: steps.check_secrets.outputs.has_secrets == 'true'
        env:
          SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          if echo "$SSH_KEY" | head -1 | grep -qE '^-----BEGIN'; then
            echo "✅ SSH key format looks valid"
          else
            echo "❌ ERROR: DROPLET_SSH_KEY does not appear to be a valid SSH private key"
            echo ""
            echo "The key must:"
            echo "  1. Be a PRIVATE key (not .pub file)"
            echo "  2. Start with: -----BEGIN OPENSSH PRIVATE KEY----- or -----BEGIN RSA PRIVATE KEY-----"
            echo "  3. End with:   -----END OPENSSH PRIVATE KEY----- or -----END RSA PRIVATE KEY-----"
            echo "  4. NOT have a passphrase"
            echo "  5. Include ALL lines between header and footer"
            echo ""
            echo "To generate a new key without passphrase:"
            echo "  ssh-keygen -t ed25519 -f cblue-deploy -N '' -C 'cblue-deploy'"
            echo "Then add cblue-deploy.pub to the droplet (~/.ssh/authorized_keys)"
            echo "and paste the content of cblue-deploy into DROPLET_SSH_KEY secret"
            exit 1
          fi

      - name: Deploy to DigitalOcean Droplet
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GH_TOKEN,GH_REPO,DEPLOY_SHA
          command_timeout: 25m
          script: |
            set -e

            # docker-compose v1 has a 60s default HTTP timeout which is too low for slow droplets
            export COMPOSE_HTTP_TIMEOUT=300

            echo "🚀 Starting deployment ($DEPLOY_SHA)..."

            # ── Detect privilege level (avoid sudo failures on non-root users) ──
            if [ "$(id -u)" -eq 0 ]; then
              SUDO=""
            elif sudo -n true 2>/dev/null; then
              SUDO="sudo"
            else
              SUDO="SKIP"
              echo "⚠️ Running as $(whoami) without passwordless sudo — nginx config will be skipped"
              echo "Fix: set DROPLET_USER=root or add '$(whoami) ALL=(ALL) NOPASSWD:ALL' to /etc/sudoers"
            fi

            # ── Ensure project directory exists ──
            DEPLOY_DIR="/opt/cblue-platform"
            if [ "$SUDO" = "SKIP" ]; then
              DEPLOY_DIR="$HOME/cblue-platform"
            fi

            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "📦 Cloning repository..."
              if [ -n "$SUDO" ] && [ "$SUDO" != "SKIP" ]; then
                $SUDO mkdir -p "$DEPLOY_DIR"
                $SUDO chown "$(whoami):$(whoami)" "$DEPLOY_DIR"
              fi
              git clone https://github.com/Bhavesh163/cblue-platform.git "$DEPLOY_DIR"
            fi

            # ── Pull latest code ──
            cd "$DEPLOY_DIR"
            git pull origin main || true
            echo "✅ Code updated"

            # ── Detect docker compose command (v2 plugin vs v1 standalone) ──
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "❌ Neither 'docker compose' nor 'docker-compose' found"
              echo "Install Docker Compose: https://docs.docker.com/compose/install/"
              exit 1
            fi
            echo "Using: $DC"

            # ── Login to GHCR and pull pre-built backend image ──
            REPO_LC=$(echo "$GH_REPO" | tr '[:upper:]' '[:lower:]')
            export GITHUB_REPOSITORY="$REPO_LC"
            IMAGE="ghcr.io/$REPO_LC/backend:latest"

            PULLED_IMAGE=false
            if echo "$GH_TOKEN" | docker login ghcr.io -u github --password-stdin 2>&1; then
              echo "✅ Logged in to GHCR"
              # Use docker pull directly (more reliable than docker-compose pull on v1)
              echo "Pulling $IMAGE ..."
              if docker pull "$IMAGE" 2>&1; then
                echo "✅ Pulled pre-built backend image from GHCR"
                PULLED_IMAGE=true
              else
                echo "⚠️ Could not pull $IMAGE — will build locally"
              fi
            else
              echo "⚠️ GHCR login failed — will build locally"
            fi

            # If GHCR image unavailable, build from updated Dockerfile (git pull already ran)
            if [ "$PULLED_IMAGE" = "false" ]; then
              echo "🔨 Building backend image locally from Dockerfile..."
              $DC -f infrastructure/docker/docker-compose.yml build backend 2>&1
              echo "✅ Local build complete"
            fi

            # ── Remove old backend container ──
            $DC -f infrastructure/docker/docker-compose.yml rm -sf backend 2>/dev/null || true
            # Also remove nginx container if left from previous deploy
            $DC -f infrastructure/docker/docker-compose.yml rm -sf nginx 2>/dev/null || true

            # ── Start core services ──
            $DC -f infrastructure/docker/docker-compose.yml up -d postgres redis rabbitmq backend || {
              echo "❌ No backend image available. Deploy cannot proceed."
              exit 1
            }
            echo "⏳ Waiting for services to stabilize..."
            sleep 25

            # ── Run Prisma migrations (MUST succeed) ──
            echo "🔍 Checking container environment..."
            # Use docker exec directly (docker-compose v1 has socket timeout issues)
            BACKEND_CONTAINER=$(docker ps --filter "name=backend" --format "{{.Names}}" | head -1)
            if [ -z "$BACKEND_CONTAINER" ]; then
              echo "❌ Backend container not found!"
              docker ps -a 2>&1
              exit 1
            fi
            echo "Using container: $BACKEND_CONTAINER"
            docker exec "$BACKEND_CONTAINER" sh -c '
              echo "DATABASE_URL set: ${DATABASE_URL:+yes (len=${#DATABASE_URL})}"
              echo "Config files:" && ls -la prisma.config.* 2>/dev/null || true
              # Safety net: create prisma.config.mjs if missing (stale GHCR image)
              if [ ! -f prisma.config.mjs ]; then
                echo "⚠️ prisma.config.mjs missing — creating it now..."
                printf "export default {\n  schema: \"prisma/schema.prisma\",\n  migrations: { path: \"prisma/migrations\" },\n  datasource: { url: process.env.DATABASE_URL },\n};\n" > prisma.config.mjs
                echo "✅ Created prisma.config.mjs"
              fi
              # Ensure .bin/prisma symlink exists
              if [ ! -f node_modules/.bin/prisma ]; then
                echo "⚠️ .bin/prisma missing — creating symlink..."
                mkdir -p node_modules/.bin
                ln -sf ../prisma/build/index.js node_modules/.bin/prisma
                echo "✅ Created .bin/prisma symlink"
              fi
              echo "Node version:" && node --version
              echo "Running prisma migrate deploy..."
              npx prisma migrate deploy 2>&1
            '
            MIGRATE_EXIT=$?
            if [ $MIGRATE_EXIT -ne 0 ]; then
              echo "❌ Prisma migration FAILED (exit $MIGRATE_EXIT)"
              echo "Checking backend logs for clues..."
              docker logs --tail=30 "$BACKEND_CONTAINER" 2>&1 || true
              # Don't exit — backend may still be healthy with existing tables
            else
              echo "✅ Prisma migrations applied successfully"
            fi

            # ── Verify backend health ──
            sleep 5
            HEALTH=$(curl -sf http://127.0.0.1:3002/api/v1/health 2>&1 || echo '{"status":"unreachable"}')
            echo "Backend health: $HEALTH"

            # ── Redirect external port 80 → 3002 via iptables (bypasses host nginx) ──
            # Host nginx keeps running but external traffic is redirected before reaching it.
            # This avoids: no sudo, no stopping nginx, no Docker nginx container, no hanging.
            echo "🔧 Setting up iptables port 80 → 3002 redirect..."
            docker run --rm --net=host --cap-add=NET_ADMIN alpine sh -c '
              apk add --no-cache iptables >/dev/null 2>&1
              # Remove existing redirect to avoid duplicates
              iptables -t nat -D PREROUTING -p tcp --dport 80 -j REDIRECT --to-port 3002 2>/dev/null || true
              # Add fresh redirect rule at top of chain
              iptables -t nat -I PREROUTING 1 -p tcp --dport 80 -j REDIRECT --to-port 3002
              echo "iptables PREROUTING rules:"
              iptables -t nat -L PREROUTING -n --line-numbers | head -5
            ' 2>&1 && echo "✅ iptables redirect active: external port 80 → 3002" || echo "⚠️ iptables redirect failed"

            # ── Final verification ──
            if echo "$HEALTH" | grep -q '"ok"'; then
              echo "✅ Backend healthy + iptables redirect active — registration should work"
            else
              echo "❌ Backend not healthy — check logs"
              docker logs --tail=20 "$BACKEND_CONTAINER" 2>&1 || true
            fi

            echo "✅ Deploy complete: $DEPLOY_SHA"
