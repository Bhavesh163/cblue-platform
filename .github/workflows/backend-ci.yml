name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'infrastructure/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cblue_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://admin:testpassword@localhost:5432/cblue_test
      JWT_SECRET: test-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm test

      - run: npm run build

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Check if backend changed
        id: check
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^backend/'; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Downcase repo name
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/backend:${{ github.sha }}
            ghcr.io/${{ env.REPO }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [test, docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: read

    steps:
      - name: Check deployment secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.DROPLET_HOST }}" ]; then
            echo "⚠️ DROPLET_HOST secret not configured — skipping deploy"
            echo "Add secrets in GitHub → Settings → Secrets and variables → Actions"
            echo "Required: DROPLET_HOST, DROPLET_USER, DROPLET_SSH_KEY"
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate SSH key format
        if: steps.check_secrets.outputs.has_secrets == 'true'
        env:
          SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          if echo "$SSH_KEY" | head -1 | grep -qE '^-----BEGIN'; then
            echo "✅ SSH key format looks valid"
          else
            echo "❌ ERROR: DROPLET_SSH_KEY does not appear to be a valid SSH private key"
            echo ""
            echo "The key must:"
            echo "  1. Be a PRIVATE key (not .pub file)"
            echo "  2. Start with: -----BEGIN OPENSSH PRIVATE KEY----- or -----BEGIN RSA PRIVATE KEY-----"
            echo "  3. End with:   -----END OPENSSH PRIVATE KEY----- or -----END RSA PRIVATE KEY-----"
            echo "  4. NOT have a passphrase"
            echo "  5. Include ALL lines between header and footer"
            echo ""
            echo "To generate a new key without passphrase:"
            echo "  ssh-keygen -t ed25519 -f cblue-deploy -N '' -C 'cblue-deploy'"
            echo "Then add cblue-deploy.pub to the droplet (~/.ssh/authorized_keys)"
            echo "and paste the content of cblue-deploy into DROPLET_SSH_KEY secret"
            exit 1
          fi

      - name: Deploy to DigitalOcean Droplet
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GH_TOKEN,GH_REPO,DEPLOY_SHA
          command_timeout: 20m
          script: |
            set -e

            # docker-compose v1 has a 60s default HTTP timeout which is too low for slow droplets
            export COMPOSE_HTTP_TIMEOUT=300

            echo "🚀 Starting deployment ($DEPLOY_SHA)..."

            # ── Detect privilege level (avoid sudo failures on non-root users) ──
            if [ "$(id -u)" -eq 0 ]; then
              SUDO=""
            elif sudo -n true 2>/dev/null; then
              SUDO="sudo"
            else
              SUDO="SKIP"
              echo "⚠️ Running as $(whoami) without passwordless sudo — nginx config will be skipped"
              echo "Fix: set DROPLET_USER=root or add '$(whoami) ALL=(ALL) NOPASSWD:ALL' to /etc/sudoers"
            fi

            # ── Ensure project directory exists ──
            DEPLOY_DIR="/opt/cblue-platform"
            if [ "$SUDO" = "SKIP" ]; then
              DEPLOY_DIR="$HOME/cblue-platform"
            fi

            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "📦 Cloning repository..."
              if [ -n "$SUDO" ] && [ "$SUDO" != "SKIP" ]; then
                $SUDO mkdir -p "$DEPLOY_DIR"
                $SUDO chown "$(whoami):$(whoami)" "$DEPLOY_DIR"
              fi
              git clone https://github.com/Bhavesh163/cblue-platform.git "$DEPLOY_DIR"
            fi

            # ── Pull latest code ──
            cd "$DEPLOY_DIR"
            git pull origin main || true
            echo "✅ Code updated"

            # ── Detect docker compose command (v2 plugin vs v1 standalone) ──
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "❌ Neither 'docker compose' nor 'docker-compose' found"
              echo "Install Docker Compose: https://docs.docker.com/compose/install/"
              exit 1
            fi
            echo "Using: $DC"

            # ── Login to GHCR and pull pre-built backend image ──
            REPO_LC=$(echo "$GH_REPO" | tr '[:upper:]' '[:lower:]')
            export GITHUB_REPOSITORY="$REPO_LC"

            PULLED_IMAGE=false
            if echo "$GH_TOKEN" | docker login ghcr.io -u github --password-stdin 2>/dev/null; then
              echo "✅ Logged in to GHCR"
              if $DC -f infrastructure/docker/docker-compose.yml pull backend 2>/dev/null; then
                echo "✅ Pulled pre-built backend image from GHCR"
                PULLED_IMAGE=true
              else
                echo "⚠️ Could not pull image from GHCR — will build locally"
              fi
            else
              echo "⚠️ GHCR login failed — will build locally"
            fi

            # ── Remove old backend container (avoids docker-compose v1 ContainerConfig bug) ──
            # docker-compose 1.29.2 crashes on "recreate" when the new image was built by BuildKit
            # because BuildKit images lack the legacy ContainerConfig field. Removing first forces a clean create.
            $DC -f infrastructure/docker/docker-compose.yml rm -sf backend 2>/dev/null || true

            # ── Start core services ──
            if [ "$PULLED_IMAGE" = "true" ]; then
              # Use pre-built image (fast — no build on droplet)
              $DC -f infrastructure/docker/docker-compose.yml up -d postgres redis rabbitmq backend
            else
              # Fallback: build on droplet (slow but works)
              $DC -f infrastructure/docker/docker-compose.yml up -d --build postgres redis rabbitmq backend
            fi
            echo "⏳ Waiting for services to stabilize..."
            sleep 25

            # ── Verify containers are running ──
            $DC -f infrastructure/docker/docker-compose.yml ps || echo "⚠️ ps timed out — continuing anyway"

            # ── Run Prisma migrations ──
            $DC -f infrastructure/docker/docker-compose.yml exec -T backend npx prisma migrate deploy 2>&1 || echo "⚠️ Migration note: check above for details"

            # ── Deploy nginx config (requires root or passwordless sudo) ──
            if [ "$SUDO" != "SKIP" ] && [ -f infrastructure/nginx/cblue.conf ]; then
              $SUDO cp infrastructure/nginx/cblue.conf /etc/nginx/sites-available/cblue
              $SUDO ln -sf /etc/nginx/sites-available/cblue /etc/nginx/sites-enabled/cblue
              $SUDO rm -f /etc/nginx/sites-enabled/default
              if $SUDO nginx -t 2>&1; then
                $SUDO systemctl reload nginx
                echo "✅ Nginx config deployed and reloaded"
              else
                echo "❌ Nginx config test failed — kept old config"
              fi
            fi

            # ── Verify backend health ──
            sleep 5
            HEALTH=$(curl -sf http://127.0.0.1:3002/api/v1/health 2>&1 || echo '{"status":"unreachable"}')
            echo "Backend health: $HEALTH"

            # ── Verify nginx proxy ──
            if [ "$SUDO" != "SKIP" ]; then
              PROXY_CHECK=$(curl -sf http://127.0.0.1/api/v1/health -H 'Host: api.cblue.co.th' 2>&1 || echo '{"status":"nginx_proxy_failed"}')
              echo "Nginx proxy check: $PROXY_CHECK"
            fi

            echo "✅ Deploy complete: $DEPLOY_SHA"
