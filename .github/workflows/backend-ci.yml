name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'infrastructure/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cblue_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://admin:testpassword@localhost:5432/cblue_test
      JWT_SECRET: test-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm test

      - run: npm run build

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Check if backend changed
        id: check
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^backend/'; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Downcase repo name
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/backend:${{ github.sha }}
            ghcr.io/${{ env.REPO }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [test, docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check deployment secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.DROPLET_HOST }}" ]; then
            echo "⚠️ DROPLET_HOST secret not configured — skipping deploy"
            echo "Add secrets in GitHub → Settings → Secrets and variables → Actions"
            echo "Required: DROPLET_HOST, DROPLET_USER, DROPLET_SSH_KEY"
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate SSH key format
        if: steps.check_secrets.outputs.has_secrets == 'true'
        env:
          SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          if echo "$SSH_KEY" | head -1 | grep -qE '^-----BEGIN'; then
            echo "✅ SSH key format looks valid"
          else
            echo "❌ ERROR: DROPLET_SSH_KEY does not appear to be a valid SSH private key"
            echo ""
            echo "The key must:"
            echo "  1. Be a PRIVATE key (not .pub file)"
            echo "  2. Start with: -----BEGIN OPENSSH PRIVATE KEY----- or -----BEGIN RSA PRIVATE KEY-----"
            echo "  3. End with:   -----END OPENSSH PRIVATE KEY----- or -----END RSA PRIVATE KEY-----"
            echo "  4. NOT have a passphrase"
            echo "  5. Include ALL lines between header and footer"
            echo ""
            echo "To generate a new key without passphrase:"
            echo "  ssh-keygen -t ed25519 -f cblue-deploy -N '' -C 'cblue-deploy'"
            echo "Then add cblue-deploy.pub to the droplet (~/.ssh/authorized_keys)"
            echo "and paste the content of cblue-deploy into DROPLET_SSH_KEY secret"
            exit 1
          fi

      - name: Deploy to DigitalOcean Droplet
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e

            echo "🚀 Starting deployment..."

            # ── Ensure project directory exists ──
            if [ ! -d /opt/cblue-platform ]; then
              echo "📦 Cloning repository..."
              sudo git clone https://github.com/Bhavesh163/cblue-platform.git /opt/cblue-platform
            fi

            # ── Pull latest code ──
            cd /opt/cblue-platform
            git pull origin main || true
            echo "✅ Code updated"

            # ── Bring up ALL services with local build ──
            docker compose -f infrastructure/docker/docker-compose.yml up -d --build
            echo "⏳ Waiting for services to stabilize..."
            sleep 25

            # ── Verify containers are running ──
            docker compose -f infrastructure/docker/docker-compose.yml ps

            # ── Run Prisma migrations ──
            docker compose -f infrastructure/docker/docker-compose.yml exec -T backend npx prisma migrate deploy 2>&1 || echo "⚠️ Migration note: check above for details"

            # ── Deploy nginx config ──
            if [ -f infrastructure/nginx/cblue.conf ]; then
              sudo cp infrastructure/nginx/cblue.conf /etc/nginx/sites-available/cblue
              sudo ln -sf /etc/nginx/sites-available/cblue /etc/nginx/sites-enabled/cblue
              sudo rm -f /etc/nginx/sites-enabled/default
              if sudo nginx -t 2>&1; then
                sudo systemctl reload nginx
                echo "✅ Nginx config deployed and reloaded"
              else
                echo "❌ Nginx config test failed — kept old config"
              fi
            fi

            # ── Verify backend health ──
            sleep 5
            HEALTH=$(curl -sf http://127.0.0.1:3002/api/v1/health 2>&1 || echo '{"status":"unreachable"}')
            echo "Backend health: $HEALTH"

            # ── Verify nginx proxy ──
            PROXY_CHECK=$(curl -sf http://127.0.0.1/api/v1/health -H 'Host: api.cblue.co.th' 2>&1 || echo '{"status":"nginx_proxy_failed"}')
            echo "Nginx proxy check: $PROXY_CHECK"

            echo "✅ Deploy complete: ${{ github.sha }}"
