name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'infrastructure/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cblue_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://admin:testpassword@localhost:5432/cblue_test
      JWT_SECRET: test-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm test

      - run: npm run build

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Check if backend changed
        id: check
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^backend/'; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Downcase repo name
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/backend:${{ github.sha }}
            ghcr.io/${{ env.REPO }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [test, docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check deployment secrets
        run: |
          if [ -z "${{ secrets.DROPLET_HOST }}" ]; then
            echo "⚠️ DROPLET_HOST secret not configured — skipping deploy"
            echo "Add secrets in GitHub → Settings → Secrets and variables → Actions"
            echo "Required: DROPLET_HOST, DROPLET_USER, DROPLET_SSH_KEY"
            exit 0
          fi
        id: check_secrets

      - name: Deploy to DigitalOcean Droplet
        if: ${{ secrets.DROPLET_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e

            # ── Pull latest code ──
            cd /opt/cblue-platform
            git pull origin main || true

            # ── Bring up ALL services (postgres, redis, rabbitmq, backend) ──
            docker compose -f infrastructure/docker/docker-compose.yml up -d
            echo "⏳ Waiting for services to stabilize..."
            sleep 20

            # ── Run Prisma migrations ──
            docker compose -f infrastructure/docker/docker-compose.yml exec -T backend npx prisma migrate deploy 2>&1 || echo "⚠️ Migration note: check above for details"

            # ── Deploy nginx config ──
            if [ -f infrastructure/nginx/cblue.conf ]; then
              sudo cp infrastructure/nginx/cblue.conf /etc/nginx/sites-available/cblue
              sudo ln -sf /etc/nginx/sites-available/cblue /etc/nginx/sites-enabled/cblue
              sudo rm -f /etc/nginx/sites-enabled/default
              if sudo nginx -t 2>&1; then
                sudo systemctl reload nginx
                echo "✅ Nginx config deployed and reloaded"
              else
                echo "❌ Nginx config test failed — kept old config"
              fi
            fi

            # ── Verify backend health ──
            sleep 5
            HEALTH=$(curl -sf http://127.0.0.1:3002/api/v1/health 2>&1 || echo '{"status":"unreachable"}')
            echo "Backend health: $HEALTH"
            echo "✅ Deploy complete: ${{ github.sha }}"
